name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          fail: true
          # Check published content sources. Documentation, raw archives, Liquid-only
          # links, and providers that reject automated requests are handled elsewhere.
          args: >-
            --user-agent 'curl/7.54'
            --exclude-path _pages/404.md
            --exclude-path _pages/about.md
            --exclude-path _pages/blog.md
            --exclude-path _pages/cv.md
            --exclude '^https://dl\.acm\.org/'
            --exclude '^https://ieeexplore\.ieee\.org/'
            --exclude '^https://psycnet\.apa\.org/'
            --exclude '^https://cse\.snu\.ac\.kr/'
            --exclude '^https://scholar\.google\.com/'
            --verbose --no-progress
            './_pages/**/*.md'
            './_posts/**/*.md'
            './_news/**/*.md'
